name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        config: [Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.config }}

      - name: Package
        run: cmake --build build --config ${{ matrix.config }} --target package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctypr-${{ github.ref_name }}-${{ matrix.os }}
          path: |
            build/ctypr-*.tar.gz
            build/ctypr-*.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ctypr-${{ github.ref_name }}-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ctypr-*.tar.gz
            ctypr-*.zip
