<script type="text/javascript" src="$relpath^../doxygen-awesome-darkmode-toggle.js"></script>
<script type="text/javascript">
(function(){
  var sb = document.getElementById("MSearchBox");
  if (sb && sb.parentNode) {
    var toggle = document.createElement("doxygen-awesome-dark-mode-toggle");
    toggle.title = DoxygenAwesomeDarkModeToggle.title;
    toggle.updateIcon();
    toggle.onclick = function(){
      DoxygenAwesomeDarkModeToggle.userPreference = !DoxygenAwesomeDarkModeToggle.darkModeEnabled;
      this.updateIcon();
    };
    sb.parentNode.insertBefore(toggle, sb.nextSibling);
  }
})();
</script>
